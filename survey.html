<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take the Survey — Systems &amp; Feelings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Systems &amp; Feelings</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">About</a>
        <a href="survey.html" class="nav-link active">Take the Survey</a>
        <a href="results.html" class="nav-link">Results</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="survey-header">
      <h1>Systems &amp; Feelings Survey</h1>
      <p>Rate how much you agree with each statement.</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="progress-label" id="progress-label">0 of 20 answered</p>
    </div>

    <div class="survey-scale-legend">
      <span><strong>1</strong> = Strongly disagree</span>
      <span><strong>2</strong> = Disagree</span>
      <span><strong>3</strong> = Agree</span>
      <span><strong>4</strong> = Strongly agree</span>
    </div>

    <form id="survey-form">
      <h2 class="survey-section-title">Systemizing items</h2>
      <div id="systemizing-questions"></div>

      <h2 class="survey-section-title">Empathy items</h2>
      <div id="empathy-questions"></div>

      <div class="survey-actions">
        <a href="index.html" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submit-btn" disabled>See My Results</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Educational demo inspired by <a href="https://yourmorals.org/" target="_blank" rel="noopener">YourMorals.org</a>.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="survey.js"></script>
</body>
</html>
